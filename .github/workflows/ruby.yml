name: Ruby
on: [push, pull_request]
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4.1.0
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: 3.4
        bundler-cache: true
    - name: Install dependencies
      run: |
        gem install rails
        bundle install
    - name: Check Ruby Syntax in .rb files
      run: find ./app/ | grep ".*\.rb$" | xargs -L 1 ruby -c
    - name: Setup database
      run: rails db:migrate RAILS_ENV=test
    - name: Run tests
      run: bundle exec rake

  smoke-test:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4.1.0
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: 3.4
        bundler-cache: true
    - name: Install dependencies
      run: |
        gem install rails
        bundle install
    - name: Make scripts executable
      run: |
        chmod +x start-app.sh
        chmod +x stop-app.sh
        chmod +x status.sh
        chmod +x smoke-ci.sh
    - name: Run smoke CI test
      run: ./smoke-ci.sh
