name: Ruby
on: [push, pull_request]
permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4
          bundler-cache: true

      - name: Run RuboCop
        run: |
          echo "::group::RuboCop"
          bundle exec rubocop --format progress --format clang
          echo "::endgroup::"

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4.1.0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4
          bundler-cache: true

      - name: Database migrations
        run: |
          echo "::group::Database Migrations"
          bundle exec rails db:migrate RAILS_ENV=test
          echo "::endgroup::"

      - name: CI health check
        run: |
          echo "::group::CI Health Check"
          bundle exec rails ci:health RAILS_ENV=test
          echo "::endgroup::"

      - name: Run tests
        run: |
          echo "::group::Running Tests"
          bundle exec rails test RAILS_ENV=test --verbose
          echo "::endgroup::"

  smoke-test:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4.1.0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4
          bundler-cache: true

      - name: Database migrations
        run: |
          echo "::group::Database Migrations"
          bundle exec rails db:migrate RAILS_ENV=test
          echo "::endgroup::"

      - name: Make scripts executable
        run: |
          chmod +x start-app.sh
          chmod +x stop-app.sh
          chmod +x status.sh
          chmod +x smoke-ci.sh

      - name: Run smoke CI test
        run: |
          echo "::group::Smoke Test"
          ./smoke-ci.sh
          echo "::endgroup::"
